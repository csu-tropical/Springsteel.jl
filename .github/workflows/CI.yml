name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ matrix.group }}
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'     # Latest stable
        os:
          - ubuntu-latest
        arch:
          - x64
        group:
          - basis
          - grids
          - transforms
          - tiling
          - io
          - solver
          - mubar
          - interpolation
          - filtering
          - r3x
          - bc
          - multipatch
          - tile_multipatch
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        shell: julia --color=yes --project {0}
        run: |
          using Pkg
          Pkg.instantiate()

      - name: Run tests
        env:
          TEST_GROUP: ${{ matrix.group }}
        run: julia --code-coverage=user --color=yes --project test/runtests.jl

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
